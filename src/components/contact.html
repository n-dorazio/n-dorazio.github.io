<section id="contact" class="contact-section">
    <div class="container">
        <div class="section-header">
            <h2>Get In Touch</h2>
        </div>
        
        <div class="contact-content">
            <div class="contact-info">
                <div class="contact-links">
                    <a href="https://github.com/n-dorazio" target="_blank" class="contact-link">
                        <i class="fab fa-github"></i>
                        <span>GitHub</span>
                    </a>
                    <a href="https://www.linkedin.com/in/nathaniel-d-orazio-247392233/" target="_blank" class="contact-link">
                        <i class="fab fa-linkedin"></i>
                        <span>LinkedIn</span>
                    </a>
                    <a href="mailto:nathaniel.dorazio.m@gmail.com" class="contact-link">
                        <i class="fas fa-envelope"></i>
                        <span>nathaniel.dorazio.m@gmail.com</span>
                    </a>
                </div>
            </div>

            <div class="contact-form">
                <form id="contact-form">
                    <div class="form-group">
                        <input type="text" id="name" name="name" required placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" name="email" required placeholder="Your Email">
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" required placeholder="Your Message"></textarea>
                    </div>
                    <button type="button" class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
